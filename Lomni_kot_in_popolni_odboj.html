<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lomni kot in popolni odboj</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        canvas {
            touch-action: none;
            background-color: #ffffff;
            cursor: crosshair;
        }
        .control-panel, .canvas-container {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        #tooltip {
            position: absolute;
            pointer-events: none;
            background: #000000;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
            z-index: 100;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            transform: translate(-50%, -120%);
            white-space: nowrap;
            font-weight: 600;
        }
        input[type="range"] {
            accent-color: #1138cc;
        }
        .nav-link {
            transition: all 0.2s;
        }
        .nav-link:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col text-slate-800">

    <div id="tooltip">Opis elementa</div>

    <!-- Navigacijska vrstica -->
    <nav class="bg-slate-900 text-slate-300 py-3 px-6 shadow-sm border-b border-slate-800">
        <div class="container mx-auto flex flex-wrap gap-4 items-center justify-center lg:justify-start">
            <a href="Preslikava_cez_leco.html" class="nav-link px-3 py-1 rounded-md text-sm font-medium">Preslikava čez lečo</a>
            <a href="Lomni_kot_in_popolni_odboj.html" class="nav-link px-3 py-1 rounded-md text-sm font-medium text-white bg-[#1138cc]">Lomni kot in popolni odboj</a>
            <a href="#" class="nav-link px-3 py-1 rounded-md text-sm font-medium">Nihala</a>
            <a href="#" class="nav-link px-3 py-1 rounded-md text-sm font-medium">Valovanje</a>
            <a href="#" class="nav-link px-3 py-1 rounded-md text-sm font-medium">Tabela s fizikalnimi količinami</a>
        </div>
    </nav>

    <!-- Glava -->
    <header class="bg-[#1138cc] text-white p-6 shadow-md">
        <div class="container mx-auto">
            <h1 class="text-3xl font-extrabold tracking-tight">Lomni kot in popolni odboj</h1>
            <p class="text-blue-100 text-sm mt-1 opacity-90">Interaktivno učenje optike in Snellovega zakona</p>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-6 flex flex-col lg:flex-row gap-8">
        
        <!-- Območje simulacije -->
        <div class="flex-grow canvas-container overflow-hidden border border-slate-200 relative flex flex-col">
            <canvas id="opticsCanvas" class="w-full h-full min-h-[550px]"></canvas>
        </div>

        <!-- Stranska vrstica z nastavitvami -->
        <aside class="w-full lg:w-96 flex flex-col gap-6">
            <div class="control-panel p-8 border border-slate-100">
                <h2 class="text-xl font-bold mb-6 text-[#1138cc] border-b pb-3">Nastavitve</h2>
                
                <!-- Zgornja snov -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-slate-600 mb-2 tracking-wider">Zgornja snov (n₁)</label>
                    <select id="n1Select" class="w-full p-2.5 bg-slate-100 border border-slate-200 rounded-lg text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="1.00">Zrak (n = 1.00)</option>
                        <option value="1.33">Voda (n = 1.33)</option>
                        <option value="1.50">Steklo (n = 1.50)</option>
                        <option value="custom">Neznana snov A</option>
                    </select>
                    <div id="n1CustomContainer" class="hidden mt-2">
                        <input type="number" id="n1Custom" value="1.20" step="0.01" min="1" max="3" class="w-full p-2 bg-white border border-slate-300 rounded-lg text-sm font-mono">
                    </div>
                </div>

                <!-- Spodnja snov -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-slate-600 mb-2 tracking-wider">Spodnja snov (n₂)</label>
                    <select id="n2Select" class="w-full p-2.5 bg-slate-100 border border-slate-200 rounded-lg text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="1.33">Voda (n = 1.33)</option>
                        <option value="1.00">Zrak (n = 1.00)</option>
                        <option value="1.50">Steklo (n = 1.50)</option>
                        <option value="custom">Neznana snov B</option>
                    </select>
                    <div id="n2CustomContainer" class="hidden mt-2">
                        <input type="number" id="n2Custom" value="1.80" step="0.01" min="1" max="3" class="w-full p-2 bg-white border border-slate-300 rounded-lg text-sm font-mono">
                    </div>
                </div>

                <!-- Vpadni kot -->
                <div class="space-y-6">
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-sm font-semibold text-slate-600 tracking-wider">Vpadni kot (α)</label>
                            <div class="flex items-center gap-1">
                                <input type="number" id="angleInput" min="0" max="89" value="45" class="w-16 p-1 text-right font-bold text-[#1138cc] border border-slate-200 rounded outline-none focus:border-blue-500">
                                <span class="font-bold text-[#1138cc]">°</span>
                            </div>
                        </div>
                        <input type="range" id="angleRange" min="0" max="89" value="45" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>

                <!-- Lastnosti loma -->
                <div class="mt-10 pt-6 border-t border-slate-100">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Podatki simulacije</h3>
                    <div id="outputProps" class="space-y-3">
                        <div class="flex justify-between items-center p-2 rounded-lg bg-slate-50 border border-slate-100">
                            <span class="text-slate-500 font-medium text-sm">Lomni kot (β):</span> 
                            <div class="flex items-center gap-1">
                                <input type="number" id="betaInput" min="0" max="89" step="0.1" value="0" class="w-16 p-1 text-right font-bold text-[#1138cc] border border-slate-200 rounded outline-none focus:border-blue-500">
                                <span class="font-bold text-[#1138cc]">°</span>
                            </div>
                        </div>
                        <div class="flex justify-between items-center p-2 rounded-lg bg-slate-50 border border-slate-100">
                            <span class="text-slate-500 font-medium text-sm">Mejni kot popolnega odboja: </span> 
                            <span id="propCritical" class="font-bold text-slate-900 text-sm">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        const canvas = document.getElementById('opticsCanvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        
        const n1Select = document.getElementById('n1Select');
        const n2Select = document.getElementById('n2Select');
        const n1Custom = document.getElementById('n1Custom');
        const n2Custom = document.getElementById('n2Custom');
        const n1CustomContainer = document.getElementById('n1CustomContainer');
        const n2CustomContainer = document.getElementById('n2CustomContainer');
        
        const angleRange = document.getElementById('angleRange');
        const angleInput = document.getElementById('angleInput');

        const betaInput = document.getElementById('betaInput');
        const propCritical = document.getElementById('propCritical');

        let state = {
            n1: 1.00,
            n2: 1.33,
            alpha: 45,
            centerX: 0,
            centerY: 0,
            isTotalReflection: false
        };

        function resize() {
            const rect = canvas.parentNode.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            state.centerX = canvas.width / 2;
            state.centerY = canvas.height / 2;
            draw();
        }

        window.addEventListener('resize', resize);
        setTimeout(resize, 0);

        function updateN() {
            if (n1Select.value === 'custom') {
                n1CustomContainer.classList.remove('hidden');
                state.n1 = parseFloat(n1Custom.value) || 1.0;
            } else {
                n1CustomContainer.classList.add('hidden');
                state.n1 = parseFloat(n1Select.value);
            }

            if (n2Select.value === 'custom') {
                n2CustomContainer.classList.remove('hidden');
                state.n2 = parseFloat(n2Custom.value) || 1.0;
            } else {
                n2CustomContainer.classList.add('hidden');
                state.n2 = parseFloat(n2Select.value);
            }
            draw();
        }

        n1Select.onchange = updateN;
        n2Select.onchange = updateN;
        n1Custom.oninput = updateN;
        n2Custom.oninput = updateN;

        angleRange.oninput = (e) => { 
            state.alpha = parseInt(e.target.value); 
            angleInput.value = state.alpha;
            draw(); 
        };

        angleInput.oninput = (e) => {
            let val = parseInt(e.target.value);
            if (isNaN(val)) val = 0;
            if (val < 0) val = 0;
            if (val > 89) val = 89;
            state.alpha = val;
            angleRange.value = val;
            draw();
        };

        betaInput.oninput = (e) => {
            let beta = parseFloat(e.target.value);
            if (isNaN(beta)) return;
            if (beta < 0) beta = 0;
            if (beta > 89.9) beta = 89.9;

            const betaRad = (beta * Math.PI) / 180;
            const sinAlpha = (state.n2 / state.n1) * Math.sin(betaRad);

            if (sinAlpha <= 1) {
                const alphaRad = Math.asin(sinAlpha);
                state.alpha = (alphaRad * 180) / Math.PI;
                angleInput.value = Math.round(state.alpha);
                angleRange.value = Math.round(state.alpha);
                draw();
            }
        };

        canvas.onclick = (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            let hit = "";
            if (Math.abs(my - state.centerY) < 10) {
                hit = "Mejna ploskev";
            } else if (Math.abs(mx - state.centerX) < 10) {
                hit = "Vpadna pravokotnica";
            } else if (my < state.centerY) {
                hit = "Zgornja snov (n = " + state.n1.toFixed(2) + ")";
            } else {
                hit = "Spodnja snov (n = " + state.n2.toFixed(2) + ")";
            }

            if (hit) {
                tooltip.innerText = hit;
                tooltip.style.left = e.clientX + 'px';
                tooltip.style.top = e.clientY + 'px';
                tooltip.style.display = 'block';
            } else {
                tooltip.style.display = 'none';
            }
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const n1 = state.n1;
            const n2 = state.n2;
            const alphaRad = (state.alpha * Math.PI) / 180;
            
            const sinBeta = (n1 / n2) * Math.sin(alphaRad);
            state.isTotalReflection = sinBeta > 1;
            const betaRad = Math.asin(sinBeta);

            const criticalAngleVal = n1 > n2 ? (Math.asin(n2 / n1) * 180 / Math.PI) : null;
            propCritical.innerText = criticalAngleVal ? criticalAngleVal.toFixed(1) + '°' : '-';

            if (state.isTotalReflection) {
                betaInput.value = "";
                betaInput.disabled = true;
                betaInput.placeholder = "N/A";
            } else {
                betaInput.disabled = false;
                betaInput.placeholder = "";
                if (document.activeElement !== betaInput) {
                    betaInput.value = (betaRad * 180 / Math.PI).toFixed(1);
                }
            }

            // 1. Ozadje snovi
            ctx.fillStyle = '#f1f5f9'; // Zgoraj
            ctx.fillRect(0, 0, canvas.width, state.centerY);
            ctx.fillStyle = '#e2e8f0'; // Spodaj
            ctx.fillRect(0, state.centerY, canvas.width, canvas.height - state.centerY);

            // 2. Mejna ploskev
            ctx.beginPath();
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 2;
            ctx.moveTo(0, state.centerY);
            ctx.lineTo(canvas.width, state.centerY);
            ctx.stroke();

            // 3. Vpadnica (Pravokotnica)
            ctx.beginPath();
            ctx.strokeStyle = '#64748b';
            ctx.setLineDash([5, 5]);
            ctx.moveTo(state.centerX, 0);
            ctx.lineTo(state.centerX, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Oznaka vpadnica
            drawLabel('Vpadna pravokotnica', state.centerX + 10, 30, '#475569', true);

            const rayLen = Math.min(canvas.width, canvas.height) * 0.4;

            // 4. Vpadni žarek
            const xIn = state.centerX - Math.sin(alphaRad) * rayLen;
            const yIn = state.centerY - Math.cos(alphaRad) * rayLen;
            drawRay(xIn, yIn, state.centerX, state.centerY, '#ef4444');
            drawLabel('Vpadni žarek', xIn + 10, yIn - 10, '#475569', true);

            // 5. Laser
            drawLaser(xIn, yIn, -alphaRad);

            // 6. Odbiti žarek
            if (n1 !== n2) {
                const xRef = state.centerX + Math.sin(alphaRad) * rayLen;
                const yRef = state.centerY - Math.cos(alphaRad) * rayLen;
                drawRay(state.centerX, state.centerY, xRef, yRef, '#f59e0b', state.isTotalReflection ? 3 : 1);
                drawLabel('Odbiti žarek', xRef - 70, yRef - 10, '#475569', true);

                // Kotni lok gama (odbojni kot)
                drawAngleArc(state.centerX, state.centerY, 50, -Math.PI/2, -Math.PI/2 + alphaRad, '#f59e0b');
                ctx.fillStyle = '#f59e0b';
                ctx.font = 'bold 14px Inter';
                ctx.fillText('γ', state.centerX + 15, state.centerY - 60);
            }

            // 7. Lomljeni žarek
            if (!state.isTotalReflection) {
                const xOut = state.centerX + Math.sin(betaRad) * rayLen;
                const yOut = state.centerY + Math.cos(betaRad) * rayLen;
                drawRay(state.centerX, state.centerY, xOut, yOut, '#10b981', 3);
                drawLabel('Lomljeni žarek', xOut + 10, yOut - 10, '#475569', true);
                
                drawAngleArc(state.centerX, state.centerY, 40, Math.PI/2, Math.PI/2 - betaRad, '#10b981');
                ctx.fillStyle = '#10b981';
                ctx.font = 'bold 14px Inter';
                ctx.fillText('β', state.centerX + 15, state.centerY + 55);
            } else {
                ctx.fillStyle = '#ef4444';
                ctx.font = '900 24px Inter';
                ctx.textAlign = 'center';
                ctx.fillText('POPOLNI ODBOJ', state.centerX, state.centerY + 80);
                ctx.textAlign = 'left';
            }

            // Kotni lok alfa
            drawAngleArc(state.centerX, state.centerY, 50, -Math.PI/2, -Math.PI/2 - alphaRad, '#ef4444');
            ctx.fillStyle = '#ef4444';
            ctx.font = 'bold 14px Inter';
            ctx.fillText('α', state.centerX - 25, state.centerY - 60);

            // Oznake snovi
            drawLabel('Zgornja snov (n₁ = ' + n1.toFixed(2) + ')', 20, state.centerY - 20, '#475569', true);
            drawLabel('Spodnja snov (n₂ = ' + n2.toFixed(2) + ')', 20, state.centerY + 30, '#475569', true);
            drawLabel('Meja med snovema', canvas.width - 150, state.centerY - 10, '#475569', true);
        }

        function drawLaser(x, y, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle + Math.PI); // Obrnjen proti središču
            
            // Ohišje
            ctx.fillStyle = '#334155';
            ctx.fillRect(-12, 0, 24, 45);
            
            // Glava
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(-10, -5, 20, 5);
            
            // Gumb
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(0, 20, 3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        function drawLabel(text, x, y, color, bold = false) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.font = `${bold ? '700' : '600'} 13px Inter`;
            ctx.shadowBlur = 4;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.9)';
            ctx.fillText(text, x, y);
            ctx.restore();
        }

        function drawRay(x1, y1, x2, y2, color, width = 3) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            // Puščica
            const midX = (x1 + x2) / 2;
            const midY = (y1 + y2) / 2;
            const angle = Math.atan2(y2 - y1, x2 - x1);
            const headLen = 12;
            
            ctx.beginPath();
            ctx.fillStyle = color;
            ctx.moveTo(midX, midY);
            ctx.lineTo(midX - headLen * Math.cos(angle - Math.PI / 6), midY - headLen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(midX - headLen * Math.cos(angle + Math.PI / 6), midY - headLen * Math.sin(angle + Math.PI / 6));
            ctx.fill();
        }

        function drawAngleArc(x, y, radius, startAngle, endAngle, color) {
            ctx.beginPath();
            ctx.arc(x, y, radius, startAngle, endAngle, startAngle > endAngle);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        draw();
    </script>
</body>
</html>
